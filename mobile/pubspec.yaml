name: billsleeve_mobile
description: BillSleeve Offline-First Bill & Warranty Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Core dependencies for our zero-knowledge offline architecture
  encrypt: ^5.0.3        # AES-256-GCM encryption
  pointycastle: ^3.7.3   # Core crypto algorithms
  crypto: ^3.0.3         # SHA hashes
  http: ^1.1.0           # API requests
  camera: ^0.10.5+9      # Receipt scanning
  path_provider: ^2.1.1  # Local storage
  shared_preferences: ^2.2.2 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
